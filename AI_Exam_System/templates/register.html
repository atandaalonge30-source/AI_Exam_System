{% extends "base.html" %}
{% block title %}Register - AI Exam System{% endblock %}
{% block content %}
<div class="login-wrapper" style="min-height:calc(100vh - 64px)">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-user-plus"></i>
            <h1>Create Account</h1>
            <p>Register as a Student</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email (Optional)</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" class="form-control" placeholder="Choose a password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.85rem;">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        <div style="text-align:center;margin-top:1.25rem;">
            <p style="color:#64748b;font-size:0.85rem;">Already have an account?
                <a href="{{ url_for('login') }}" style="color:#2563eb;font-weight:600;">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
